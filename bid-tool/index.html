<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Cornerstone Bid</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    /* ── Full screen map ── */
    #map {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      background: #1a1a1a;
    }

    /* ── Top bar ── */
    .top-bar {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 12px 14px;
      background: linear-gradient(to bottom, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0) 100%);
    }

    .top-bar-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .top-bar h1 {
      font-size: 15px;
      font-weight: 800;
      color: white;
      letter-spacing: 0.3px;
      flex: 1;
    }

    .top-bar h1 span {
      color: #7dc87d;
    }

    /* Search bar */
    .search-wrap {
      display: flex;
      gap: 6px;
    }

    #addressInput {
      flex: 1;
      padding: 7px 12px;
      border-radius: 8px;
      border: 1.5px solid rgba(255,255,255,0.2);
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(10px);
      color: white;
      font-size: 13px;
      outline: none;
    }

    #addressInput::placeholder { color: rgba(255,255,255,0.4); }

    .search-btn {
      padding: 7px 12px;
      border-radius: 8px;
      border: 1.5px solid rgba(255,255,255,0.2);
      background: rgba(28,58,28,0.8);
      backdrop-filter: blur(10px);
      color: white;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
    }

    /* Override Google autocomplete dropdown to match dark theme */
    .pac-container {
      background: rgba(15,31,15,0.97);
      border: 1px solid rgba(125,200,125,0.3);
      border-radius: 10px;
      margin-top: 4px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    .pac-item {
      color: #c5d9c5;
      border-top: 1px solid rgba(255,255,255,0.06);
      padding: 8px 12px;
      font-size: 13px;
      cursor: pointer;
    }
    .pac-item:hover { background: rgba(74,124,74,0.3); }
    .pac-item-query { color: white; font-weight: 600; }
    .pac-icon { display: none; }

    .icon-btn {
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.2);
      color: white;
      border-radius: 10px;
      padding: 8px 14px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.15s;
    }

    .icon-btn:active { background: rgba(255,255,255,0.3); }

    .icon-btn.draw-active {
      background: rgba(125,200,125,0.4);
      border-color: #7dc87d;
    }

    /* ── Acreage badge ── */
    .acreage-badge {
      position: fixed;
      top: 60px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 100;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(125,200,125,0.4);
      border-radius: 20px;
      padding: 6px 16px;
      color: white;
      font-size: 14px;
      font-weight: 700;
      display: none;
      white-space: nowrap;
    }

    .acreage-badge.visible { display: block; }
    .acreage-badge span { color: #7dc87d; }

    /* ── Bottom controls ── */
    .bottom-controls {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      z-index: 100;
      padding: 16px 14px 28px;
      background: linear-gradient(to top, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0) 100%);
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .control-row {
      display: flex;
      gap: 8px;
      justify-content: center;
    }

    .pill {
      flex: 1;
      max-width: 120px;
      padding: 10px 8px;
      border-radius: 12px;
      border: 1.5px solid rgba(255,255,255,0.2);
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(10px);
      color: white;
      font-size: 12px;
      font-weight: 700;
      text-align: center;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: all 0.15s;
    }

    .pill .pill-icon { font-size: 18px; display: block; margin-bottom: 2px; }
    .pill .pill-sub { font-size: 10px; color: rgba(255,255,255,0.55); font-weight: 500; margin-top: 1px; }

    .pill.selected {
      border-color: #7dc87d;
      background: rgba(28,58,28,0.85);
    }

    .pill.selected-warn {
      border-color: #f0a030;
      background: rgba(80,40,0,0.85);
    }

    .quote-btn {
      width: 100%;
      padding: 14px;
      background: #2a6a2a;
      color: white;
      border: none;
      border-radius: 14px;
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
      display: none;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.15s;
    }

    .quote-btn:active { background: #3a8a3a; }

    /* ── Side panel ── */
    .panel-backdrop {
      position: fixed;
      inset: 0;
      z-index: 200;
      background: rgba(0,0,0,0.3);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
    }

    .panel-backdrop.open {
      opacity: 1;
      pointer-events: all;
    }

    .side-panel {
      position: fixed;
      top: 0; right: 0;
      width: min(360px, 88vw);
      height: 100vh;
      z-index: 201;
      background: #0f1f0f;
      transform: translateX(100%);
      transition: transform 0.35s cubic-bezier(0.32, 0.72, 0, 1);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .side-panel.open {
      transform: translateX(0);
    }

    .panel-header {
      background: #1c3a1c;
      padding: 52px 20px 18px;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
    }

    .panel-header h2 {
      font-size: 20px;
      font-weight: 800;
      color: white;
    }

    .panel-header p {
      font-size: 12px;
      color: #7dc87d;
      margin-top: 2px;
    }

    .close-btn {
      background: rgba(255,255,255,0.1);
      border: none;
      color: white;
      width: 32px; height: 32px;
      border-radius: 50%;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .panel-body {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      -webkit-overflow-scrolling: touch;
    }

    .summary-chips {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }

    .chip {
      padding: 5px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 700;
      background: rgba(255,255,255,0.08);
      color: #c5d9c5;
    }

    .chip.green { background: rgba(74,124,74,0.4); color: #7dc87d; }
    .chip.orange { background: rgba(200,120,20,0.4); color: #f0c060; }

    /* Quote rows */
    .q-section {
      margin-bottom: 20px;
    }

    .q-label {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: #4a7c4a;
      margin-bottom: 10px;
    }

    .q-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      font-size: 14px;
    }

    .q-row .lbl { color: #8aaa8a; }
    .q-row .val { color: white; font-weight: 600; }

    .q-total {
      background: rgba(74,124,74,0.2);
      border: 1px solid rgba(125,200,125,0.3);
      border-radius: 12px;
      padding: 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }

    .q-total .lbl { color: #a8c5a8; font-size: 14px; font-weight: 700; }
    .q-total .val { font-size: 30px; font-weight: 900; color: #7dc87d; }

    /* Timeline */
    .timeline-box {
      background: rgba(255,255,255,0.05);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
    }

    .timeline-box .tl-title {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: #4a7c4a;
      margin-bottom: 10px;
    }

    .timeline-days {
      font-size: 28px;
      font-weight: 900;
      color: white;
    }

    .timeline-days span { font-size: 14px; color: #8aaa8a; font-weight: 500; margin-left: 4px; }

    .timeline-note {
      font-size: 12px;
      color: #8aaa8a;
      margin-top: 4px;
      line-height: 1.4;
    }

    .terrain-warning {
      background: rgba(200,120,20,0.15);
      border: 1px solid rgba(200,120,20,0.3);
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 12px;
      color: #f0c060;
      margin-bottom: 16px;
      line-height: 1.4;
    }

    .copy-btn {
      width: 100%;
      padding: 14px;
      background: #2a6a2a;
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.15s;
    }

    .copy-btn:active { background: #3a8a3a; }

    /* API key screen */
    .api-screen {
      position: fixed;
      inset: 0;
      z-index: 300;
      background: #0f1f0f;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 30px;
      text-align: center;
    }

    .api-screen .logo { font-size: 48px; margin-bottom: 16px; }
    .api-screen h2 { font-size: 22px; font-weight: 800; color: white; margin-bottom: 8px; }
    .api-screen p { font-size: 14px; color: #7a9a7a; margin-bottom: 24px; line-height: 1.5; }

    .api-input {
      width: 100%;
      padding: 14px 16px;
      border-radius: 12px;
      border: 1.5px solid #2a5a2a;
      background: rgba(255,255,255,0.07);
      color: white;
      font-size: 14px;
      margin-bottom: 12px;
      outline: none;
    }

    .api-input::placeholder { color: #4a6a4a; }

    .api-save-btn {
      width: 100%;
      padding: 14px;
      background: #2a6a2a;
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
    }

    .divider { height: 1px; background: rgba(255,255,255,0.06); margin: 4px 0; }
  </style>
</head>
<body>

<!-- API Key Screen -->
<div class="api-screen" id="apiScreen">
  <div class="logo">🌲</div>
  <h2>Cornerstone Bid Tool</h2>
  <p>Enter your Google Maps API key to get started. You only need to do this once.</p>
  <input class="api-input" id="apiKeyInput" type="text" placeholder="Paste API key here…">
  <button class="api-save-btn" onclick="saveApiKey()">Load Map →</button>
</div>

<!-- Full screen map -->
<div id="map"></div>

<!-- Top bar -->
<div class="top-bar">
  <div class="top-bar-row">
    <h1>Cornerstone <span>Bid</span></h1>
    <button class="icon-btn" id="drawBtn" onclick="startDrawing()">✏️ Draw</button>
    <button class="icon-btn" onclick="clearDrawing()">🗑 Clear</button>
  </div>
  <div class="search-wrap">
    <input id="addressInput" type="text" placeholder="Search address or location…" onkeydown="if(event.key==='Enter') searchAddress()">
    <button class="search-btn" onclick="searchAddress()">Go</button>
  </div>
</div>

<!-- Acreage badge -->
<div class="acreage-badge" id="acreageBadge">
  <span id="acreageVal">—</span> acres drawn
</div>

<!-- Bottom controls -->
<div class="bottom-controls">
  <div class="control-row" id="densityRow">
    <div class="pill" id="pill-light" onclick="selectDensity('light')">
      <span class="pill-icon">🌿</span>
      Light
      <div class="pill-sub">$3,500/ac</div>
    </div>
    <div class="pill" id="pill-medium" onclick="selectDensity('medium')">
      <span class="pill-icon">🌳</span>
      Medium
      <div class="pill-sub">$4,500/ac</div>
    </div>
    <div class="pill" id="pill-dense" onclick="selectDensity('dense')">
      <span class="pill-icon">🌲</span>
      Dense
      <div class="pill-sub">$6,500/ac</div>
    </div>
  </div>
  <div class="control-row" id="terrainRow">
    <div class="pill" id="pill-smooth" onclick="selectTerrain('smooth')">
      <span class="pill-icon">✅</span>
      Smooth
      <div class="pill-sub">Standard</div>
    </div>
    <div class="pill pill-warn" id="pill-difficult" onclick="selectTerrain('difficult')">
      <span class="pill-icon">⚠️</span>
      Difficult
      <div class="pill-sub">+$2,200/day</div>
    </div>
  </div>
  <button class="quote-btn" id="quoteBtn" onclick="openPanel()">View Estimate →</button>
</div>

<!-- Panel backdrop -->
<div class="panel-backdrop" id="backdrop" onclick="closePanel()"></div>

<!-- Side panel -->
<div class="side-panel" id="sidePanel">
  <div class="panel-header">
    <div>
      <h2>Estimate</h2>
      <p>Forestry Mulching</p>
    </div>
    <button class="close-btn" onclick="closePanel()">✕</button>
  </div>
  <div class="panel-body" id="panelBody"></div>
</div>

<script>
  const RATES    = { light: 3500, medium: 4500, dense: 6500 };
  const PROD_DAY = { light: 2.5,  medium: 1.5,  dense: 0.75 }; // acres/day
  const TERRAIN_UPCHARGE = 2200;

  let acreage = null, density = null, terrain = null;
  let map, drawingManager, polygon;

  // ── API Key ─────────────────────────────────────────────────────
  function saveApiKey() {
    const key = document.getElementById('apiKeyInput').value.trim();
    if (!key) return;
    localStorage.setItem('gmaps_key', key);
    document.getElementById('apiScreen').style.display = 'none';
    loadMaps(key);
  }

  function loadMaps(key) {
    const s = document.createElement('script');
    s.src = `https://maps.googleapis.com/maps/api/js?key=${key}&libraries=drawing,geometry,places&callback=initMap`;
    s.async = true; s.defer = true;
    document.head.appendChild(s);
  }

  window.addEventListener('load', () => {
    const key = localStorage.getItem('gmaps_key');
    if (key) {
      document.getElementById('apiScreen').style.display = 'none';
      loadMaps(key);
    }
  });

  // ── Map init ────────────────────────────────────────────────────
  function initMap() {
    map = new google.maps.Map(document.getElementById('map'), {
      center: { lat: 38.2527, lng: -85.7585 },
      zoom: 16,
      mapTypeId: 'satellite',
      disableDefaultUI: true,
      gestureHandling: 'greedy',
      tilt: 0,
    });

    drawingManager = new google.maps.drawing.DrawingManager({
      drawingMode: null,
      drawingControl: false,
      polygonOptions: {
        fillColor: '#4a7c4a',
        fillOpacity: 0.3,
        strokeColor: '#7dc87d',
        strokeWeight: 2.5,
        editable: true,
        draggable: true,
      },
    });

    drawingManager.setMap(map);
    initAutocomplete();

    google.maps.event.addListener(drawingManager, 'polygoncomplete', poly => {
      if (polygon) polygon.setMap(null);
      polygon = poly;
      drawingManager.setDrawingMode(null);
      document.getElementById('drawBtn').classList.remove('draw-active');
      updateAcreage();
      google.maps.event.addListener(poly.getPath(), 'set_at', updateAcreage);
      google.maps.event.addListener(poly.getPath(), 'insert_at', updateAcreage);
    });
  }

  function initAutocomplete() {
    const input = document.getElementById('addressInput');
    const autocomplete = new google.maps.places.Autocomplete(input, {
      fields: ['geometry'],
    });
    autocomplete.addListener('place_changed', () => {
      const place = autocomplete.getPlace();
      if (place.geometry) {
        map.setCenter(place.geometry.location);
        map.setZoom(17);
        input.blur();
      }
    });
  }

  function searchAddress() {
    const input = document.getElementById('addressInput').value.trim();
    if (!input || !map) return;
    const geocoder = new google.maps.Geocoder();
    geocoder.geocode({ address: input }, (results, status) => {
      if (status === 'OK') {
        map.setCenter(results[0].geometry.location);
        map.setZoom(17);
        document.getElementById('addressInput').blur();
      }
    });
  }

  function startDrawing() {
    if (!drawingManager) return;
    clearDrawing();
    drawingManager.setDrawingMode(google.maps.drawing.OverlayType.POLYGON);
    document.getElementById('drawBtn').classList.add('draw-active');
  }

  function clearDrawing() {
    if (polygon) { polygon.setMap(null); polygon = null; }
    acreage = null;
    document.getElementById('acreageBadge').classList.remove('visible');
    document.getElementById('drawBtn').classList.remove('draw-active');
    checkShowQuoteBtn();
  }

  function updateAcreage() {
    if (!polygon) return;
    const sq = google.maps.geometry.spherical.computeArea(polygon.getPath());
    acreage = Math.round((sq / 4046.856) * 100) / 100;
    const badge = document.getElementById('acreageBadge');
    document.getElementById('acreageVal').textContent = acreage.toFixed(2);
    badge.classList.add('visible');
    checkShowQuoteBtn();
  }

  // ── Selectors ───────────────────────────────────────────────────
  function selectDensity(val) {
    density = val;
    ['light','medium','dense'].forEach(d =>
      document.getElementById('pill-' + d).classList.toggle('selected', d === val)
    );
    checkShowQuoteBtn();
  }

  function selectTerrain(val) {
    terrain = val;
    document.getElementById('pill-smooth').classList.toggle('selected', val === 'smooth');
    document.getElementById('pill-difficult').classList.toggle('selected-warn', val === 'difficult');
    document.getElementById('pill-difficult').classList.toggle('selected', false);
    checkShowQuoteBtn();
  }

  function checkShowQuoteBtn() {
    const show = acreage && density && terrain;
    const btn = document.getElementById('quoteBtn');
    btn.style.display = show ? 'block' : 'none';
  }

  // ── Panel ───────────────────────────────────────────────────────
  function openPanel() {
    renderQuote();
    document.getElementById('sidePanel').classList.add('open');
    document.getElementById('backdrop').classList.add('open');
  }

  function closePanel() {
    document.getElementById('sidePanel').classList.remove('open');
    document.getElementById('backdrop').classList.remove('open');
  }

  function renderQuote() {
    const rate     = RATES[density];
    const base     = acreage * rate;
    const prodRate = PROD_DAY[density];
    let   days     = Math.ceil(acreage / prodRate);
    let   terrainCost = 0;

    if (terrain === 'difficult') {
      terrainCost = TERRAIN_UPCHARGE * days; // upcharge per extra day
      days = Math.ceil(days * 1.4); // 40% longer on difficult terrain
    }

    const total = base + terrainCost;

    const densityLabel = { light: 'Light', medium: 'Medium', dense: 'Dense' }[density];
    const terrainLabel = terrain === 'difficult' ? 'Difficult' : 'Smooth';

    let html = `
      <div class="summary-chips">
        <div class="chip green">${acreage.toFixed(2)} acres</div>
        <div class="chip green">${densityLabel}</div>
        <div class="chip ${terrain === 'difficult' ? 'orange' : 'green'}">${terrainLabel} Terrain</div>
      </div>

      <div class="q-section">
        <div class="q-label">Pricing Breakdown</div>
        <div class="q-row"><span class="lbl">Acreage</span><span class="val">${acreage.toFixed(2)} ac</span></div>
        <div class="q-row"><span class="lbl">Rate (${densityLabel})</span><span class="val">$${rate.toLocaleString()}/ac</span></div>
        <div class="q-row"><span class="lbl">Base Price</span><span class="val">$${Math.round(base).toLocaleString()}</span></div>
        ${terrain === 'difficult' ? `
        <div class="q-row"><span class="lbl">Terrain Upcharge</span><span class="val" style="color:#f0c060;">+$${Math.round(terrainCost).toLocaleString()}</span></div>
        ` : ''}
        <div class="divider"></div>
      </div>

      <div class="q-total">
        <span class="lbl">Total Estimate</span>
        <span class="val">$${Math.round(total).toLocaleString()}</span>
      </div>

      <div class="timeline-box">
        <div class="tl-title">Estimated Timeline</div>
        <div class="timeline-days">${days === 1 ? '1' : `${days}`}<span>${days === 1 ? 'day' : 'days'}</span></div>
        <div class="timeline-note">Based on ${prodRate} acres/day production rate for ${densityLabel.toLowerCase()} vegetation${terrain === 'difficult' ? ', adjusted for difficult terrain' : ''}.</div>
      </div>

      ${terrain === 'difficult' ? `
      <div class="terrain-warning">⚠️ Difficult terrain — rocky, steep, or heavy debris. Project duration extended and $2,200/day equipment rate applied.</div>
      ` : ''}

      <button class="copy-btn" onclick="copyQuote(${Math.round(total)}, ${days})">📋 Copy Estimate</button>
    `;

    document.getElementById('panelBody').innerHTML = html;
  }

  function copyQuote(total, days) {
    const densityLabel = { light: 'Light', medium: 'Medium', dense: 'Dense' }[density];
    const rate = RATES[density];
    const base = acreage * rate;

    let text =
      `Cornerstone Hardscape & Excavation\n` +
      `Forestry Mulching Estimate\n` +
      `——————————————\n` +
      `Acreage: ${acreage.toFixed(2)} acres\n` +
      `Vegetation: ${densityLabel}\n` +
      `Terrain: ${terrain === 'difficult' ? 'Difficult' : 'Smooth'}\n` +
      `Base Price: $${Math.round(base).toLocaleString()}\n`;

    if (terrain === 'difficult') {
      const terrainCost = total - Math.round(base);
      text += `Terrain Upcharge: +$${terrainCost.toLocaleString()}\n`;
    }

    text +=
      `——————————————\n` +
      `Total: $${total.toLocaleString()}\n` +
      `Est. Timeline: ${days} ${days === 1 ? 'day' : 'days'}`;

    navigator.clipboard.writeText(text).then(() => {
      const btn = document.querySelector('.copy-btn');
      btn.textContent = '✅ Copied!';
      setTimeout(() => btn.textContent = '📋 Copy Estimate', 2000);
    });
  }
</script>
</body>
</html>
