<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Cornerstone Bid</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    #map {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      background: #111;
    }

    /* ── Top bar ── */
    .top-bar {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      flex-direction: column;
      gap: 7px;
      padding: 14px 14px 0;
    }

    .top-bar-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .top-bar h1 {
      font-size: 14px;
      font-weight: 700;
      color: white;
      letter-spacing: 0.5px;
      flex: 1;
      text-shadow: 0 1px 4px rgba(0,0,0,0.5);
    }

    .top-bar h1 span { color: #6fcf6f; }

    .glass-btn {
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,0.18);
      color: white;
      border-radius: 8px;
      padding: 7px 13px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: 0.3px;
      white-space: nowrap;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.15s;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
    }

    .glass-btn:active { background: rgba(255,255,255,0.22); }

    .glass-btn.active {
      background: rgba(111,207,111,0.25);
      border-color: rgba(111,207,111,0.5);
      color: #aeffae;
    }

    .glass-btn.crm-link {
      border-color: rgba(111,207,111,0.3);
      color: #9eff9e;
    }

    /* Search */
    .search-wrap {
      display: flex;
      gap: 5px;
      width: fit-content;
      max-width: 260px;
    }

    #addressInput {
      width: 180px;
      padding: 6px 10px;
      border-radius: 7px;
      border: 1px solid rgba(255,255,255,0.15);
      background: rgba(0,0,0,0.45);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      color: white;
      font-size: 12px;
      outline: none;
    }

    #addressInput::placeholder { color: rgba(255,255,255,0.35); }

    .search-go {
      padding: 6px 10px;
      border-radius: 7px;
      border: 1px solid rgba(111,207,111,0.3);
      background: rgba(40,90,40,0.6);
      backdrop-filter: blur(16px);
      color: #aeffae;
      font-size: 11px;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.5px;
    }

    /* Acreage pill */
    .acreage-pill {
      position: fixed;
      top: 90px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 100;
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(111,207,111,0.35);
      border-radius: 20px;
      padding: 5px 16px;
      color: rgba(255,255,255,0.9);
      font-size: 13px;
      font-weight: 600;
      display: none;
      white-space: nowrap;
      letter-spacing: 0.2px;
    }

    .acreage-pill.visible { display: block; }
    .acreage-pill b { color: #6fcf6f; }

    /* ── Bottom controls ── */
    .bottom-controls {
      position: fixed;
      bottom: 0; left: 0;
      z-index: 100;
      padding: 0 12px 28px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      align-items: flex-start;
    }

    .pill-row {
      display: flex;
      gap: 5px;
    }

    .sel-pill {
      padding: 7px 12px 6px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.13);
      background: rgba(10,10,10,0.55);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      color: white;
      font-size: 11px;
      font-weight: 600;
      text-align: center;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: all 0.15s;
      letter-spacing: 0.2px;
      white-space: nowrap;
    }

    .sel-pill .pill-label { display: block; margin-bottom: 1px; }
    .sel-pill .pill-price {
      font-size: 9px;
      color: rgba(255,255,255,0.4);
      font-weight: 500;
      letter-spacing: 0;
    }

    .sel-pill.on-green {
      border-color: rgba(111,207,111,0.5);
      background: rgba(30,70,30,0.75);
      color: #c8ffc8;
    }

    .sel-pill.on-green .pill-price { color: rgba(200,255,200,0.5); }

    .sel-pill.on-amber {
      border-color: rgba(240,160,40,0.5);
      background: rgba(70,35,0,0.75);
      color: #ffe8a0;
    }

    .sel-pill.on-amber .pill-price { color: rgba(255,232,160,0.5); }

    /* Difficulty slider */
    .diff-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(10,10,10,0.55);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,0.13);
      border-radius: 8px;
      padding: 7px 10px;
    }

    .diff-label {
      font-size: 10px;
      font-weight: 600;
      color: rgba(255,255,255,0.5);
      letter-spacing: 0.5px;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .diff-controls {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .diff-btn {
      width: 22px; height: 22px;
      border-radius: 50%;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.15);
      color: white;
      font-size: 14px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      line-height: 1;
      -webkit-tap-highlight-color: transparent;
    }

    .diff-val {
      font-size: 12px;
      font-weight: 700;
      color: white;
      min-width: 34px;
      text-align: center;
    }

    .diff-val.has-diff { color: #f0a028; }

    #diffSlider {
      -webkit-appearance: none;
      width: 80px;
      height: 3px;
      border-radius: 2px;
      background: rgba(255,255,255,0.15);
      outline: none;
    }

    #diffSlider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px; height: 14px;
      border-radius: 50%;
      background: #6fcf6f;
      cursor: pointer;
    }

    .estimate-btn {
      padding: 9px 18px;
      background: rgba(30,80,30,0.85);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(111,207,111,0.35);
      color: #c8ffc8;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      display: none;
      letter-spacing: 0.3px;
      -webkit-tap-highlight-color: transparent;
    }

    /* ── Side panel ── */
    .backdrop {
      position: fixed;
      inset: 0;
      z-index: 200;
      background: rgba(0,0,0,0.25);
      backdrop-filter: blur(2px);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
    }

    .backdrop.open { opacity: 1; pointer-events: all; }

    .panel {
      position: fixed;
      top: 0; right: 0;
      width: min(340px, 90vw);
      height: 100vh;
      z-index: 201;
      background: rgba(8,18,8,0.92);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-left: 1px solid rgba(255,255,255,0.08);
      transform: translateX(100%);
      transition: transform 0.32s cubic-bezier(0.32,0.72,0,1);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .panel.open { transform: translateX(0); }

    .panel-head {
      padding: 52px 20px 16px;
      border-bottom: 1px solid rgba(255,255,255,0.07);
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
    }

    .panel-head h2 {
      font-size: 18px;
      font-weight: 700;
      color: white;
      letter-spacing: 0.3px;
    }

    .panel-head p {
      font-size: 11px;
      color: rgba(111,207,111,0.8);
      margin-top: 2px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .x-btn {
      width: 28px; height: 28px;
      border-radius: 50%;
      background: rgba(255,255,255,0.08);
      border: none;
      color: rgba(255,255,255,0.6);
      font-size: 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .panel-body {
      flex: 1;
      overflow-y: auto;
      padding: 18px 20px;
      -webkit-overflow-scrolling: touch;
    }

    /* Tags */
    .tags { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 18px; }

    .tag {
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.3px;
    }

    .tag-g { background: rgba(111,207,111,0.15); color: #6fcf6f; border: 1px solid rgba(111,207,111,0.2); }
    .tag-a { background: rgba(240,160,40,0.15); color: #f0a028; border: 1px solid rgba(240,160,40,0.2); }

    /* Rows */
    .section-label {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: rgba(111,207,111,0.6);
      margin-bottom: 8px;
    }

    .row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 9px 0;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      font-size: 13px;
    }

    .row .l { color: rgba(255,255,255,0.45); }
    .row .v { color: white; font-weight: 600; }

    /* Total box */
    .total-box {
      background: rgba(111,207,111,0.08);
      border: 1px solid rgba(111,207,111,0.2);
      border-radius: 10px;
      padding: 14px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin: 14px 0;
    }

    .total-box .l { color: rgba(255,255,255,0.5); font-size: 13px; font-weight: 600; }
    .total-box .v { font-size: 28px; font-weight: 800; color: #6fcf6f; }

    /* Timeline */
    .tl-box {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 10px;
      padding: 14px 16px;
      margin-bottom: 12px;
    }

    .tl-box .section-label { margin-bottom: 6px; }

    .tl-days {
      font-size: 26px;
      font-weight: 800;
      color: white;
      line-height: 1;
    }

    .tl-days span { font-size: 13px; color: rgba(255,255,255,0.4); font-weight: 400; margin-left: 4px; }

    .tl-note {
      font-size: 11px;
      color: rgba(255,255,255,0.35);
      margin-top: 5px;
      line-height: 1.4;
    }

    /* Warning */
    .warn-box {
      background: rgba(240,160,40,0.08);
      border: 1px solid rgba(240,160,40,0.2);
      border-radius: 8px;
      padding: 9px 12px;
      font-size: 11px;
      color: rgba(240,160,40,0.85);
      margin-bottom: 12px;
      line-height: 1.4;
    }

    /* Action btn */
    .action-btn {
      width: 100%;
      padding: 13px;
      background: rgba(30,80,30,0.7);
      border: 1px solid rgba(111,207,111,0.3);
      color: #c8ffc8;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.3px;
      transition: background 0.15s;
      margin-bottom: 8px;
    }

    .action-btn:active { background: rgba(40,100,40,0.9); }
    .action-btn.secondary {
      background: rgba(255,255,255,0.05);
      border-color: rgba(255,255,255,0.12);
      color: rgba(255,255,255,0.7);
      font-size: 13px;
    }

    /* ── CRM form ── */
    .crm-divider {
      border: none;
      border-top: 1px solid rgba(255,255,255,0.07);
      margin: 18px 0 16px;
    }

    .crm-input {
      width: 100%;
      padding: 10px 12px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.05);
      color: white;
      font-size: 13px;
      outline: none;
      margin-bottom: 8px;
      -webkit-appearance: none;
    }

    .crm-input::placeholder { color: rgba(255,255,255,0.25); }
    .crm-input:focus { border-color: rgba(111,207,111,0.35); background: rgba(255,255,255,0.07); }

    .crm-row {
      display: flex;
      gap: 7px;
      margin-bottom: 8px;
    }

    .crm-row .crm-input { margin-bottom: 0; flex: 1; }

    .crm-status {
      font-size: 12px;
      text-align: center;
      min-height: 18px;
      margin-bottom: 4px;
      font-weight: 600;
      letter-spacing: 0.2px;
    }

    /* API screen */
    .api-screen {
      position: fixed;
      inset: 0;
      z-index: 300;
      background: rgba(6,14,6,0.97);
      backdrop-filter: blur(20px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px;
      text-align: center;
    }

    .api-mark {
      width: 48px; height: 48px;
      border-radius: 12px;
      background: rgba(111,207,111,0.12);
      border: 1px solid rgba(111,207,111,0.25);
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 18px;
    }

    .api-mark svg { width: 24px; height: 24px; }

    .api-screen h2 { font-size: 20px; font-weight: 700; color: white; margin-bottom: 6px; }
    .api-screen p { font-size: 13px; color: rgba(255,255,255,0.4); margin-bottom: 24px; line-height: 1.5; }

    .api-input {
      width: 100%;
      padding: 12px 14px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.06);
      color: white;
      font-size: 13px;
      margin-bottom: 10px;
      outline: none;
    }

    .api-input::placeholder { color: rgba(255,255,255,0.25); }

    .api-go {
      width: 100%;
      padding: 13px;
      background: rgba(30,80,30,0.8);
      border: 1px solid rgba(111,207,111,0.3);
      color: #c8ffc8;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.3px;
    }

    /* Google autocomplete */
    .pac-container {
      background: rgba(10,20,10,0.97) !important;
      border: 1px solid rgba(255,255,255,0.1) !important;
      border-radius: 10px !important;
      margin-top: 4px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif !important;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4) !important;
    }
    .pac-item {
      color: rgba(255,255,255,0.7) !important;
      border-top: 1px solid rgba(255,255,255,0.05) !important;
      padding: 9px 12px !important;
      font-size: 13px !important;
      cursor: pointer;
    }
    .pac-item:hover, .pac-item-selected { background: rgba(111,207,111,0.12) !important; }
    .pac-item-query { color: white !important; font-weight: 600 !important; }
    .pac-icon, .pac-item-logo, .hdpi.pac-logo::after { display: none !important; }
    .pac-logo::after { display: none !important; }
  </style>
</head>
<body>

<!-- API screen -->
<div class="api-screen" id="apiScreen">
  <div class="api-mark">
    <svg viewBox="0 0 24 24" fill="none" stroke="#6fcf6f" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <polygon points="3 11 22 2 13 21 11 13 3 11"/>
    </svg>
  </div>
  <h2>Cornerstone Bid Tool</h2>
  <p>Enter your Google Maps API key.<br>You only need to do this once.</p>
  <input class="api-input" id="apiKeyInput" type="text" placeholder="Paste API key here…">
  <button class="api-go" onclick="saveApiKey()">Continue</button>
</div>

<!-- Map -->
<div id="map"></div>

<!-- Top bar -->
<div class="top-bar">
  <div class="top-bar-row">
    <h1>Cornerstone <span>Bid</span></h1>
    <button class="glass-btn" id="drawBtn" onclick="startDrawing()">Draw</button>
    <button class="glass-btn" onclick="clearDrawing()">Clear</button>
    <a class="glass-btn crm-link" href="crm.html">CRM</a>
  </div>
  <div class="search-wrap">
    <input id="addressInput" type="text" placeholder="Search address…" onkeydown="if(event.key==='Enter') searchAddress()">
    <button class="search-go" onclick="searchAddress()">Go</button>
  </div>
</div>

<!-- Acreage pill -->
<div class="acreage-pill" id="acreagePill">
  <b id="acreageVal">—</b> acres
</div>

<!-- Bottom controls -->
<div class="bottom-controls">
  <div class="pill-row" id="densityRow">
    <div class="sel-pill" id="pill-light" onclick="selectDensity('light')">
      <span class="pill-label">Light</span>
      <span class="pill-price">2 ac/day</span>
    </div>
    <div class="sel-pill" id="pill-medium" onclick="selectDensity('medium')">
      <span class="pill-label">Medium</span>
      <span class="pill-price">1 ac/day</span>
    </div>
    <div class="sel-pill" id="pill-dense" onclick="selectDensity('dense')">
      <span class="pill-label">Dense</span>
      <span class="pill-price">0.5 ac/day</span>
    </div>
  </div>
  <div class="pill-row" id="diffRow">
    <div class="diff-wrap">
      <span class="diff-label">Difficulty</span>
      <div class="diff-controls">
        <button class="diff-btn" onclick="changeDiff(-5)">−</button>
        <span class="diff-val" id="diffVal">0%</span>
        <button class="diff-btn" onclick="changeDiff(5)">+</button>
      </div>
      <input type="range" id="diffSlider" min="0" max="100" step="5" value="0" oninput="setDiff(this.value)">
    </div>
  </div>
  <button class="estimate-btn" id="estimateBtn" onclick="openPanel()">View Estimate</button>
</div>

<!-- Backdrop -->
<div class="backdrop" id="backdrop" onclick="closePanel()"></div>

<!-- Panel -->
<div class="panel" id="panel">
  <div class="panel-head">
    <div>
      <h2>Estimate</h2>
      <p>Forestry Mulching</p>
    </div>
    <button class="x-btn" onclick="closePanel()">✕</button>
  </div>
  <div class="panel-body" id="panelBody"></div>
</div>

<script>
  // ── Config ────────────────────────────────────────────────────
  // Paste your deployed Apps Script URL here after deploying CRM.gs
  const CRM_URL = localStorage.getItem('crm_url') || '';

  const DAY_RATE = 3500;
  const PROD_DAY = { light: 2, medium: 1, dense: 0.5 };

  let acreage = null, density = null, difficulty = 0;
  let map, drawingManager, polygon;

  // ── API Key ──────────────────────────────────────────────────
  function saveApiKey() {
    const key = document.getElementById('apiKeyInput').value.trim();
    if (!key) return;
    localStorage.setItem('gmaps_key', key);
    document.getElementById('apiScreen').style.display = 'none';
    loadMaps(key);
  }

  function loadMaps(key) {
    const s = document.createElement('script');
    s.src = `https://maps.googleapis.com/maps/api/js?key=${key}&libraries=drawing,geometry,places&callback=initMap`;
    s.async = true; s.defer = true;
    document.head.appendChild(s);
  }

  window.addEventListener('load', () => {
    const key = localStorage.getItem('gmaps_key');
    if (key) {
      document.getElementById('apiScreen').style.display = 'none';
      loadMaps(key);
    }
  });

  // ── Map ──────────────────────────────────────────────────────
  function initMap() {
    map = new google.maps.Map(document.getElementById('map'), {
      center: { lat: 38.2527, lng: -85.7585 },
      zoom: 16,
      mapTypeId: 'satellite',
      disableDefaultUI: true,
      gestureHandling: 'greedy',
      tilt: 0,
    });

    drawingManager = new google.maps.drawing.DrawingManager({
      drawingMode: null,
      drawingControl: false,
      polygonOptions: {
        fillColor: '#4a9a4a',
        fillOpacity: 0.25,
        strokeColor: '#6fcf6f',
        strokeWeight: 2,
        editable: true,
        draggable: true,
      },
    });

    drawingManager.setMap(map);
    initAutocomplete();

    google.maps.event.addListener(drawingManager, 'polygoncomplete', poly => {
      if (polygon) polygon.setMap(null);
      polygon = poly;
      drawingManager.setDrawingMode(null);
      document.getElementById('drawBtn').classList.remove('active');
      updateAcreage();
      google.maps.event.addListener(poly.getPath(), 'set_at', updateAcreage);
      google.maps.event.addListener(poly.getPath(), 'insert_at', updateAcreage);
    });
  }

  function initAutocomplete() {
    const input = document.getElementById('addressInput');
    const ac = new google.maps.places.Autocomplete(input, { fields: ['geometry'] });
    ac.addListener('place_changed', () => {
      const place = ac.getPlace();
      if (place.geometry) {
        map.setCenter(place.geometry.location);
        map.setZoom(17);
        input.blur();
      }
    });
  }

  function searchAddress() {
    const val = document.getElementById('addressInput').value.trim();
    if (!val || !map) return;
    new google.maps.Geocoder().geocode({ address: val }, (r, s) => {
      if (s === 'OK') { map.setCenter(r[0].geometry.location); map.setZoom(17); }
    });
  }

  function startDrawing() {
    if (!drawingManager) return;
    clearDrawing();
    drawingManager.setDrawingMode(google.maps.drawing.OverlayType.POLYGON);
    document.getElementById('drawBtn').classList.add('active');
  }

  function clearDrawing() {
    if (polygon) { polygon.setMap(null); polygon = null; }
    acreage = null;
    document.getElementById('acreagePill').classList.remove('visible');
    document.getElementById('drawBtn').classList.remove('active');
    checkBtn();
  }

  function updateAcreage() {
    if (!polygon) return;
    const sq = google.maps.geometry.spherical.computeArea(polygon.getPath());
    acreage = Math.round((sq / 4046.856) * 100) / 100;
    document.getElementById('acreageVal').textContent = acreage.toFixed(2);
    document.getElementById('acreagePill').classList.add('visible');
    checkBtn();
  }

  // ── Selectors ────────────────────────────────────────────────
  function selectDensity(val) {
    density = val;
    ['light','medium','dense'].forEach(d =>
      document.getElementById('pill-' + d).classList.toggle('on-green', d === val)
    );
    checkBtn();
  }

  function changeDiff(delta) {
    difficulty = Math.max(0, Math.min(100, difficulty + delta));
    document.getElementById('diffSlider').value = difficulty;
    updateDiffDisplay();
    checkBtn();
  }

  function setDiff(val) {
    difficulty = parseInt(val);
    updateDiffDisplay();
    checkBtn();
  }

  function updateDiffDisplay() {
    const el = document.getElementById('diffVal');
    el.textContent = difficulty + '%';
    el.classList.toggle('has-diff', difficulty > 0);
  }

  function checkBtn() {
    document.getElementById('estimateBtn').style.display =
      (acreage && density) ? 'block' : 'none';
  }

  // ── Panel ────────────────────────────────────────────────────
  function openPanel() {
    renderPanel();
    document.getElementById('panel').classList.add('open');
    document.getElementById('backdrop').classList.add('open');
  }

  function closePanel() {
    document.getElementById('panel').classList.remove('open');
    document.getElementById('backdrop').classList.remove('open');
  }

  function renderPanel() {
    const prod     = PROD_DAY[density];
    const rawDays  = acreage / prod;
    const days     = Math.max(1, Math.round(rawDays * 2) / 2); // round to nearest 0.5, min 1
    const base     = days * DAY_RATE;
    const diffCost = Math.round(base * (difficulty / 100));
    const total    = base + diffCost;
    const dLabel   = { light: 'Light', medium: 'Medium', dense: 'Dense' }[density];
    const addrVal  = (document.getElementById('addressInput').value || '').trim();

    document.getElementById('panelBody').innerHTML = `
      <div class="tags">
        <span class="tag tag-g">${acreage.toFixed(2)} ac</span>
        <span class="tag tag-g">${dLabel}</span>
        ${difficulty > 0 ? `<span class="tag tag-a">${difficulty}% Difficult</span>` : ''}
      </div>

      <div class="section-label">Breakdown</div>
      <div class="row"><span class="l">Acreage</span><span class="v">${acreage.toFixed(2)} ac</span></div>
      <div class="row"><span class="l">Timeline</span><span class="v">${days} ${days === 1 ? 'day' : 'days'}</span></div>
      <div class="row"><span class="l">Daily Rate</span><span class="v">$${DAY_RATE.toLocaleString()}/day</span></div>
      <div class="row"><span class="l">Base Price</span><span class="v">$${Math.round(base).toLocaleString()}</span></div>
      ${difficulty > 0 ? `<div class="row"><span class="l">Difficulty (${difficulty}%)</span><span class="v" style="color:#f0a028">+$${diffCost.toLocaleString()}</span></div>` : ''}

      <div class="total-box">
        <span class="l">Quote Price</span>
        <div style="display:flex;align-items:center;gap:8px;margin-top:6px;">
          <span style="color:#6fcf6f;font-size:22px;font-weight:800;">$</span>
          <input id="customPrice" type="number" value="${Math.round(total)}"
            style="background:transparent;border:none;border-bottom:2px solid rgba(111,207,111,0.5);
            color:#6fcf6f;font-size:26px;font-weight:800;width:100%;outline:none;padding:2px 0;"
            oninput="this.style.borderBottomColor='rgba(240,160,40,0.7)'">
        </div>
        <div style="font-size:11px;color:rgba(255,255,255,0.3);margin-top:6px;">Edit to override calculated price</div>
      </div>

      ${difficulty >= 50 ? `<div class="warn-box">High difficulty — complex terrain will impact crew productivity and equipment usage.</div>` : ''}

      <button class="action-btn secondary" onclick="copyQuote(${Math.round(total)}, ${days})" id="copyBtn">Copy Estimate</button>

      <hr class="crm-divider">
      <div class="section-label">Customer Info</div>

      <div class="crm-row">
        <input class="crm-input" id="ci-name" type="text" placeholder="Full name">
      </div>
      <div class="crm-row">
        <input class="crm-input" id="ci-phone" type="tel" placeholder="Phone number">
        <input class="crm-input" id="ci-email" type="email" placeholder="Email">
      </div>
      <input class="crm-input" id="ci-address" type="text" placeholder="Property address" value="${addrVal.replace(/"/g, '&quot;')}">

      <div class="crm-status" id="crmStatus"></div>

      <button class="action-btn" onclick="sendQuote(${days})">Send Quote Email</button>
      <button class="action-btn secondary" onclick="saveLead(${days})">Save Lead Only</button>
    `;
  }

  function copyQuote(calcTotal, days) {
    const total    = parseInt(document.getElementById('customPrice')?.value) || calcTotal;
    const base     = days * DAY_RATE;
    const dLabel   = { light: 'Light', medium: 'Medium', dense: 'Dense' }[density];
    const diffCost = Math.round(base * (difficulty / 100));
    let text =
      `Cornerstone Hardscape & Excavation\nForestry Mulching Estimate\n` +
      `——————————————\n` +
      `Acreage: ${acreage.toFixed(2)} acres\nVegetation: ${dLabel}\n` +
      `Timeline: ${days} ${days === 1 ? 'day' : 'days'} @ $${DAY_RATE.toLocaleString()}/day\n`;
    if (difficulty > 0) text += `Difficulty (${difficulty}%): +$${diffCost.toLocaleString()}\n`;
    text += `——————————————\nTotal: $${total.toLocaleString()}`;

    navigator.clipboard.writeText(text).then(() => {
      const btn = document.getElementById('copyBtn');
      btn.textContent = 'Copied!';
      setTimeout(() => btn.textContent = 'Copy Estimate', 2000);
    });
  }

  // ── CRM helpers ───────────────────────────────────────────────
  function getCRMFields() {
    return {
      name:    (document.getElementById('ci-name')    || {}).value?.trim() || '',
      phone:   (document.getElementById('ci-phone')   || {}).value?.trim() || '',
      email:   (document.getElementById('ci-email')   || {}).value?.trim() || '',
      address: (document.getElementById('ci-address') || {}).value?.trim() || '',
    };
  }

  function setCRMStatus(msg, type) {
    const el = document.getElementById('crmStatus');
    if (!el) return;
    el.textContent = msg;
    el.style.color = type === 'err' ? '#f0a028' : '#6fcf6f';
  }

  function jsonp(url, params) {
    return new Promise((resolve, reject) => {
      const cbName = 'cb_' + Date.now();
      window[cbName] = (data) => { delete window[cbName]; script.remove(); resolve(data); };
      const script = document.createElement('script');
      params.callback = cbName;
      script.src = url + '?' + new URLSearchParams(params);
      script.onerror = () => { delete window[cbName]; script.remove(); reject(new Error('Failed to fetch')); };
      document.head.appendChild(script);
    });
  }

  async function postCRM(payload) {
    const url = localStorage.getItem('crm_url');
    if (!url) {
      setCRMStatus('No CRM URL — open CRM page to set up', 'err');
      return null;
    }
    try {
      const { action, ...rest } = payload;
      return await jsonp(url, { action, data: JSON.stringify(rest) });
    } catch (e) {
      setCRMStatus('Network error: ' + e.message, 'err');
      return null;
    }
  }

  function getMapImageUrl() {
    const key = localStorage.getItem('gmaps_key');
    if (!polygon || !key) return '';
    const coords = polygon.getPath().getArray();
    const pathParts = coords.map(p => `${p.lat().toFixed(6)},${p.lng().toFixed(6)}`);
    pathParts.push(pathParts[0]); // close polygon
    const pathStr = 'color:0xff4400ff|weight:3|fillcolor:0xff44001a|' + pathParts.join('|');
    const center = coords.reduce((acc, p) => ({ lat: acc.lat + p.lat(), lng: acc.lng + p.lng() }), { lat: 0, lng: 0 });
    const clat = (center.lat / coords.length).toFixed(6);
    const clng = (center.lng / coords.length).toFixed(6);
    return `https://maps.googleapis.com/maps/api/staticmap?center=${clat},${clng}&size=600x300&maptype=satellite&path=${encodeURIComponent(pathStr)}&key=${key}`;
  }

  async function saveLead(days) {
    const f = getCRMFields();
    const total = parseInt(document.getElementById('customPrice')?.value) || 0;
    setCRMStatus('Saving…', 'ok');
    const result = await postCRM({
      action: 'createLead',
      ...f,
      acreage: acreage.toFixed(2),
      density,
      difficulty,
      estimateTotal: total,
      dealValue: total,
      timeline: days,
      source: 'Bid Tool',
      mapImageUrl: getMapImageUrl(),
    });
    if (result?.success) {
      setCRMStatus(`Saved as ${result.id}`, 'ok');
    } else if (result?.error) {
      setCRMStatus(result.error, 'err');
    }
  }

  async function sendQuote(days) {
    const f = getCRMFields();
    const total = parseInt(document.getElementById('customPrice')?.value) || 0;
    if (!f.email) { setCRMStatus('Email required to send quote', 'err'); return; }
    setCRMStatus('Sending…', 'ok');
    const result = await postCRM({
      action: 'sendQuote',
      ...f,
      acreage: acreage.toFixed(2),
      density,
      difficulty,
      estimateTotal: total,
      dealValue: total,
      timeline: days,
      source: 'Bid Tool',
      mapImageUrl: getMapImageUrl(),
    });
    if (result?.success) {
      setCRMStatus(`Quote sent! Lead ${result.id || 'saved'}.`, 'ok');
    } else if (result?.error) {
      setCRMStatus(result.error, 'err');
    }
  }
</script>
</body>
</html>
